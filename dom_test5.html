<body>
  <ul class="list"></ul>
  <button class="add">추가</button>
  <script>
    const list = document.querySelector(".list");
    const btn = document.querySelector(".add");
    btn.addEventListener("click", () => {
      const li = document.createElement("li");
      li.textContent = "새 항목";
      list.appendChild(li);
    });
  </script>
</body>
